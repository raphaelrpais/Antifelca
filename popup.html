<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antifelca</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131c;
      --border:    #1e1e2e;
      --accent:    #22c55e;
      --accent2:   #16a34a;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --glow:      0 0 20px rgba(34,197,94,.35);
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34,197,94,.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge-18 {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 10px;
      box-shadow: var(--glow);
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .title span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 10px;
      margin-top: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Body ── */
    .body { padding: 16px 20px; }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toggle-label strong { font-size: 12px; }
    .toggle-label small { color: var(--muted); font-size: 10px; }

    .toggle {
      position: relative;
      width: 44px; height: 24px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      transition: background .25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform .25s, background .25s;
    }
    .toggle input:checked + .slider { background: var(--accent2); }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--accent);
      box-shadow: var(--glow);
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .stat-card .num {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .stat-card .lbl {
      color: var(--muted);
      font-size: 10px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 11px;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    .dot.off { background: var(--red); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      50% { opacity: .7; box-shadow: 0 0 0 5px transparent; }
    }

    /* Scan button */
    .btn-scan {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: border-color .2s, background .2s;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .btn-scan:hover {
      border-color: var(--accent);
      background: rgba(34,197,94,.06);
      color: var(--accent);
    }
    .btn-scan:active { transform: scale(.98); }
    .btn-scan svg { width: 13px; height: 13px; }

    .btn-reset {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: border-color .2s, background .2s, color .2s;
      letter-spacing: 0.5px;
    }
    .btn-reset:hover {
      border-color: var(--red);
      background: rgba(239,68,68,.06);
      color: var(--red);
    }
    .btn-reset:active { transform: scale(.98); }
    .btn-reset svg { width: 13px; height: 13px; }

    /* Footer */
    .footer {
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer span { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge-18">18+</div>
    <div class="title">Anti<span>felca</span></div>
    <div class="subtitle">Verificação automática de idade</div>
  </div>

  <div class="body">

    <div class="toggle-row">
      <div class="toggle-label">
        <strong>Bypass ativo</strong>
        <small>Confirmar modais automaticamente</small>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggleEnabled" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="num" id="statPage">0</div>
        <div class="lbl">Nesta página</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statTotal">0</div>
        <div class="lbl">Total histórico</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Monitorando age gates…</span>
    </div>

    <button class="btn-scan" id="btnScan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      ESCANEAR PÁGINA AGORA
    </button>

    <button class="btn-reset" id="btnReset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
      ZERAR CONTADOR
    </button>

  </div>

  <div class="footer">
    <span>Antifelca v1.0</span>
    <span>+18 only</span>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
